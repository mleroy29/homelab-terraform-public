---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: verify-sops-integrity
        name: Verify SOPS Integrity
        entry: >
          bash -c 'for f in "$@"; do
          sops -d "$f" >/dev/null 2>&1 || {
          echo "SOPS CRITICAL: Integrity check failed for $f. Edit via sops only!";
          exit 1;
          }; done' --
        language: system
        files: .*\.sops\.ya?ml$
        exclude: ^\.sops\.yaml$
        types: [file]

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--strict]

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint